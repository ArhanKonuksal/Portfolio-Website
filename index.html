    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />

    <!-- Performance: Preconnect to external domains -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    
    <!-- Performance: Preload critical font -->
    <link rel="preload" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" as="style" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" media="print" onload="this.media='all'" />
    
    <!-- Fallback for non-JS -->
    <noscript>
      <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
    </noscript>
    
    <!-- Dark Mode Flash Prevention + Loading Screen Setup -->
    <script>
      (function() {
        // Theme setup
        const savedTheme = localStorage.getItem('theme');
        const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
        const theme = savedTheme || (prefersDark ? 'dark' : 'light');
        document.documentElement.setAttribute('data-theme', theme);
        
        // Loading text translation
        const loadingTexts = {
          en: 'Loading...',
          tr: 'Yükleniyor...',
          nl: 'Laden...'
        };
        const savedLang = localStorage.getItem('i18nextLng') || 'en';
        const lang = savedLang.split('-')[0]; // Handle 'en-US' -> 'en'
        
        // Set loading text after DOM ready
        document.addEventListener('DOMContentLoaded', function() {
          const loadingText = document.getElementById('loading-text');
          if (loadingText) {
            loadingText.textContent = loadingTexts[lang] || loadingTexts.en;
          }
        });
      })();
    </script>
    
    <!-- Critical CSS for Loading Screen (inline to avoid FOUC) -->
    <style>
      .loading-screen {
        position: fixed;
        inset: 0;
        z-index: 9999;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background-color: #FFFFFF;
        transition: opacity 0.4s ease, visibility 0.4s ease;
      }
      [data-theme="dark"] .loading-screen {
        background-color: #0A0A0A;
      }
      .loading-screen.hidden {
        opacity: 0;
        visibility: hidden;
        pointer-events: none;
      }
      .loading-logo {
        font-size: 1.5rem;
        font-weight: 700;
        color: #0A0A0A;
        margin-bottom: 2rem;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      }
      [data-theme="dark"] .loading-logo {
        color: #EDEDED;
      }
      .loading-logo span {
        color: #4F46E5;
      }
      .loading-spinner {
        width: 48px;
        height: 48px;
        position: relative;
      }
      .loading-spinner::before,
      .loading-spinner::after {
        content: '';
        position: absolute;
        border-radius: 50%;
      }
      .loading-spinner::before {
        inset: 0;
        border: 3px solid #E5E5E5;
      }
      [data-theme="dark"] .loading-spinner::before {
        border-color: #262626;
      }
      .loading-spinner::after {
        inset: 0;
        border: 3px solid transparent;
        border-top-color: #4F46E5;
        animation: spin 0.8s linear infinite;
      }
      @keyframes spin {
        to { transform: rotate(360deg); }
      }
      .loading-text {
        margin-top: 1.5rem;
        font-size: 0.875rem;
        color: #666666;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      }
      [data-theme="dark"] .loading-text {
        color: #A3A3A3;
      }
    </style>
  </head>
  <body>
    <!-- Loading Screen -->
    <div id="loading-screen" class="loading-screen">
      <div class="loading-logo"><span>Arhan</span> Konuksal</div>
      <div class="loading-spinner"></div>
      <p id="loading-text" class="loading-text">Loading...</p>
    </div>
    
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
